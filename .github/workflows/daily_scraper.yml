# 北京时间每日 18:00（UTC 10:00）运行；需可写 token 以推送 CSV
name: Daily ETF scale update

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETF scale scraper
        run: python scraper.py

      - name: Run HS300 index scraper
        run: python hs300_index_scraper.py

      - name: Merge CSV to JSON for dashboard
        run: python csv_to_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_300_scale_data.csv hs300_index_120d.csv data.json
          if git diff --staged --quiet; then
            echo "No changes to data files."
          else
            git commit -m "chore: auto-update ETF/HS300 CSV & dashboard data.json $(date -u +%Y-%m-%d)"
            git push
          fi
